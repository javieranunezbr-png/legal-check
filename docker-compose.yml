services:
  postgres:
    image: postgres:16-alpine
    container_name: legal_check_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: legal_check
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
