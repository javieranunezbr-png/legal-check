services:
  postgres:
    image: postgres:16-alpine
    container_name: legal_check_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: legal_check
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d legal_check"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: legal_check_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: legal_check
      PGUSER: postgres
      POSTGRES_PASSWORD: postgres
      JWT_SECRET: cambia-este-secreto-en-produccion
      JWT_EXPIRES_IN: 8h
      PORT: 3001
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3001"

volumes:
  pgdata:
